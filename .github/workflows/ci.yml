name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 최신 checkout 액션 (Node.js 24 지원)
      - name: Checkout repository
        uses: actions/checkout@v4

      # Node.js 24 환경 설정
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # 의존성 설치
      - name: Install dependencies
        run: npm install

      # 빌드 실행
      - name: Build project
        run: npm run build

      # 최신 upload-artifact 액션 (Node.js 24 지원)
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
